<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
      font-family: Arial, Helvetica, sans-serif;
      color: #212529;
    "
  >
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f8f9fa; padding: 24px 0">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="max-width: 640px; background: #ffffff; border: 1px solid #dee2e6; border-radius: 8px; overflow: hidden"
          >
            <tr>
              <td style="background: #0d6efd; color: #ffffff; padding: 16px 24px; font-size: 18px; font-weight: 600">{{BRAND_NAME}}</td>
            </tr>
            <tr>
              <td style="padding: 24px">
                <h2 style="margin: 0 0 12px; font-size: 24px; line-height: 1.3; color: #212529">{{TITLE}}</h2>
                {{BODY_BLOCK}}
                {{LINK_BLOCK}}
              </td>
            </tr>
            <tr>
              <td style="padding: 14px 24px; background: #f8f9fa; border-top: 1px solid #e9ecef; font-size: 12px; color: #6c757d">
                This is an automated email notification.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
